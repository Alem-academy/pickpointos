services:
  sigex-gateway:
    build: .
    container_name: sigex-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: always
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 400M
