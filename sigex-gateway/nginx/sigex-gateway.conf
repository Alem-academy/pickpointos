server {
    listen 80;
    server_name gateway.pvz.kz;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name gateway.pvz.kz;

    ssl_certificate     /etc/letsencrypt/live/gateway.pvz.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gateway.pvz.kz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Default proxy timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
    keepalive_timeout     120s;

    # ─── eGov QR long-polling endpoints ───────────────────────────────────────
    # SIGEX holds GET /egovQr/:id open for up to 60 seconds.
    # Buffering must be disabled so the response is streamed through immediately.
    location ~ ^/api/sign/egovQr/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';
        chunked_transfer_encoding on;
    }

    # ─── All other routes ─────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
