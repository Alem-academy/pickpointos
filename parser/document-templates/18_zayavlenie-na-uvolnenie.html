<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Заявление на увольнение</title>
  <style>
    @page { size: A4; margin: 20mm; }
    * { box-sizing: border-box; }
    body {
      font-family: "Times New Roman", Times, serif;
      font-size: 14pt;
      line-height: 1.5;
      color: #000;
      max-width: 210mm;
      margin: 0 auto;
      padding: 20mm;
    }
    .header-right {
      text-align: right;
      margin-bottom: 20px;
    }
    .header-right p {
      margin: 0;
      line-height: 1.4;
    }
    .title {
      text-align: center;
      font-weight: bold;
      margin: 20px 0;
      letter-spacing: 2px;
    }
    .body-text {
      text-align: justify;
      text-indent: 20px;
      margin: 10px 0;
    }
    .signature-block {
      margin-top: 40px;
      text-align: right;
    }
    .signature-block p {
      margin: 4px 0;
    }
    .signature-block .sign-label {
      font-size: 10pt;
    }
    .line {
      display: inline-block;
      width: 150px;
      border-bottom: 1px solid #000;
    }
  </style>
</head>
<body>
  <!--
    Переменные:
    {{employerName}}           — наименование работодателя (например: ИП «Жасмин»)
    {{directorNameShortDat}}   — ФИО директора в дательном падеже
    {{employeePositionRod}}    — должность сотрудника в родительном падеже
    {{employeeFullName}}       — ФИО сотрудника полностью
    {{terminationDateDay}}     — день увольнения
    {{terminationDateMonthRu}} — месяц увольнения (русский)
    {{terminationDateYear}}    — год увольнения
  -->

  <div class="header-right">
    <p>Директору</p>
    <p>{{employerName}}</p>
    <p>{{directorNameShortDat}}</p>
    <p>от {{employeePositionRod}}</p>
    <p>{{employeeFullName}}</p>
  </div>

  <div class="title">Заявление.</div>

  <p class="body-text">
    Прошу Вас уволить меня по собственному желанию
    с {{terminationDateDay}} {{terminationDateMonthRu}} {{terminationDateYear}} года.
  </p>

  <div class="signature-block">
    <p>дата</p>
    <p><span class="line"></span></p>
    <p class="sign-label">подпись</p>
    <p>{{employeeFullName}}</p>
  </div>
</body>
</html>
