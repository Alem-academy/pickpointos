# Резерв, если сборка без Dockerfile: Chromium в PATH + не качаем Chrome в node_modules
providers = ["node"]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "chromium"

[phases.setup]
nixPkgs = ["nodejs", "npm", "python3", "chromium"]

[phases.install]
cmds = ["npm install --force"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node parser/src/index.js"
